<script>
/* ================= CONFIG — edit these 6 lines ================= */
const DIFY_URL      = "https://udify.app/chatbot/XZz1FLKPYBS5EPk1";   // embed path (/chatbot/), not /chat/
const STUDENT       = "A";                             // A = 學測, B = 會考 
const API_URL       = "https://script.google.com/macros/s/AKfycbxyQY2Ht4-WRD5oUuAM4M1ZP1Yh73Y5iV7AZXnS2hZ3oSv6eYifr3lDQ-cp5YpsIB6W/exec";    // same /exec URL as the chatflow
const SESSION_TOKEN = "99F0BE0FCB14681C155E9183A59E622BA4E2674F2EA5F999";           // low-privilege token (Apps Script v2 CONFIG)
const STUDENT_NAME  = "Yaya";
const PASSWORD      = "Tanya1031";           // v5: this page's access code (different per page)
/* ====== v6 MENU: first-screen buttons. Edit SUBJECTS to add/remove a subject ====== */
const SUBJECTS = ["國文","英文","數學","社會","自然"];
/* ====== THEMES: swap any group = edit one line (name, emoji, colors[bg1,bg2,accent], deco emojis) ====== */
const THEMES = [
 {n:"BTS",              e:"💜", c:["#2b1d4e","#5b3ba5","#a385ff"], d:["💜","🐋","✨"]},
 {n:"SEVENTEEN",        e:"💎", c:["#1d3557","#f4a7b9","#8ecae6"], d:["💎","🌹","🎀"]},
 {n:"Stray Kids",       e:"🐺", c:["#1a1a1a","#8b0000","#ff4d4d"], d:["🐺","⚡","🧭"]},
 {n:"TXT",              e:"✨", c:["#12263a","#3a7ca5","#9ad1f5"], d:["✨","🌙","🪄"]},
 {n:"ENHYPEN",          e:"🧛", c:["#14060e","#5e1224","#e3455f"], d:["🦇","🌙","🔗"]},
 {n:"NCT DREAM",        e:"💚", c:["#0f2e1d","#2f9e44","#b2f2bb"], d:["💚","🐹","🎈"]},
 {n:"EXO",              e:"⭐", c:["#22223b","#4a4e69","#c9ada7"], d:["⭐","🌌","🐺"]},
 {n:"ATEEZ",            e:"🏴‍☠️", c:["#001219","#005f73","#94d2bd"], d:["⚓","🏴‍☠️","🌊"]},
 {n:"RIIZE",            e:"🌅", c:["#3d1d0a","#c05b1f","#ffb15e"], d:["🌅","🍊","⚡"]},
 {n:"BOYNEXTDOOR",      e:"🚪", c:["#243010","#87986a","#f5e960"], d:["🚪","🌼","🛹"]},
 {n:"BLACKPINK",        e:"🖤", c:["#0d0d0d","#e75480","#ffb3cb"], d:["🖤","💗","👑"]},
 {n:"NewJeans",         e:"🐰", c:["#1b2a4a","#4d74c4","#cdd9f0"], d:["🐰","👖","🎧"]},
 {n:"IVE",              e:"🎀", c:["#3b0a2a","#c9184a","#ffb3c6"], d:["🎀","🌹","💌"]},
 {n:"aespa",            e:"🦋", c:["#0a0a1a","#5f0f9f","#33e1ed"], d:["🦋","💠","🤖"]},
 {n:"LE SSERAFIM",      e:"🔥", c:["#04123d","#1f4ce0","#bfd0ff"], d:["🔥","🦋","🗡️"]}

/* ====== MUSIC: files you place in the music/ folder of this repo (see Build Guide v5 Step 8.4) ====== */
const PLAYLIST = [
 ["巴哈 G弦之歌",        "music/01_bach_air.mp3"],
 ["巴哈 郭德堡變奏曲主題","music/02_bach_goldberg_aria.mp3"],
 ["貝多芬 月光奏鳴曲",    "music/03_beethoven_moonlight.mp3"],
 ["蕭邦 夜曲 Op.9-2",     "music/04_chopin_nocturne.mp3"],
 ["德布西 月光",          "music/05_debussy_clair_de_lune.mp3"],
 ["薩提 Gymnopédie No.1", "music/06_satie_gymnopedie1.mp3"],
 ["莫札特 K.545",         "music/07_mozart_k545.mp3"],
 ["帕海貝爾 卡農",        "music/08_pachelbel_canon.mp3"]

</script>
<style>
 :root { --bg1:#2b1d4e; --bg2:#5b3ba5; --accent:#a385ff; }
 * { margin:0; padding:0; box-sizing:border-box; }
 body { height:100dvh; display:flex; flex-direction:column; font-family:"Segoe UI","Noto Sans TC",sans-serif;
        background:linear-gradient(135deg,var(--bg1),var(--bg2)); }
 header { display:flex; align-items:center; gap:10px; padding:6px 12px; color:#fff; min-height:48px; }
 #cheer { font-weight:700; font-size:15px; text-shadow:0 1px 4px rgba(0,0,0,.4); white-space:nowrap; }
 #deco { overflow:hidden; flex:1; white-space:nowrap; opacity:.85; }
 #deco span { display:inline-block; animation:float 14s linear infinite; font-size:17px; padding:0 14px; }
 @keyframes float { from {transform:translateX(0)} to {transform:translateX(-50%)} }
 #player { display:flex; align-items:center; gap:6px; background:rgba(0,0,0,.25); border-radius:20px; padding:4px 10px; }
 #player button { background:none; border:none; color:#fff; font-size:16px; cursor:pointer; }
 #track { font-size:11px; color:#fff; max-width:130px; overflow:hidden; text-overflow:ellipsis; }
 main { flex:1; padding:0 8px 8px; }
 iframe { width:100%; height:100%; border:2px solid var(--accent); border-radius:14px; background:#fff;
          box-shadow:0 0 24px rgba(0,0,0,.35); }
 /* ---- v5 password gate ---- */
 #gate { position:fixed; inset:0; z-index:9999; display:none; align-items:center; justify-content:center;
         background:linear-gradient(135deg,var(--bg1),var(--bg2)); }
 #gatebox { background:rgba(0,0,0,.35); padding:28px 24px; border-radius:16px; text-align:center;
            border:2px solid var(--accent); box-shadow:0 0 24px rgba(0,0,0,.4); width:min(88vw,320px); }
 #gatetitle { color:#fff; font-weight:700; font-size:18px; margin-bottom:16px; }
 #gate input { width:100%; padding:12px; border:none; border-radius:10px; font-size:16px; margin-bottom:12px; }
 #gate button { width:100%; padding:12px; border:none; border-radius:10px; background:var(--accent);
                color:#1a1a1a; font-weight:700; font-size:16px; cursor:pointer; }
 #pwerr { color:#ffd0d0; font-size:13px; min-height:18px; margin-top:6px; }
 /* ---- v6 menu screen ---- */
 #menu { position:fixed; inset:0; z-index:9000; display:none; align-items:center; justify-content:center;
         background:linear-gradient(135deg,var(--bg1),var(--bg2)); overflow:auto; }
 #menubox { width:min(94vw,560px); padding:24px 18px; text-align:center; }
 #menutitle { color:#fff; font-weight:700; font-size:22px; margin-bottom:18px; text-shadow:0 1px 4px rgba(0,0,0,.4); }
 .mgroup { background:rgba(0,0,0,.25); border:2px solid var(--accent); border-radius:16px;
           padding:14px; margin-bottom:16px; box-shadow:0 0 24px rgba(0,0,0,.35); }
 .mgroup h2 { color:#fff; font-size:16px; margin-bottom:10px; }
 .mgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; }
 .mgrid button { padding:14px 8px; border:none; border-radius:12px; background:var(--accent); color:#1a1a1a;
                 font-weight:700; font-size:16px; cursor:pointer; font-family:inherit; }
 .mgrid button:active { transform:scale(.96); }
 #homebtn, #wbbtn { display:none; background:rgba(0,0,0,.25); border:none; color:#fff; font-size:15px;
            border-radius:20px; padding:4px 12px; cursor:pointer; }
 /* ---- v6.2 whiteboard ---- */
 #wb { position:fixed; inset:0; z-index:9500; display:none; flex-direction:column; background:rgba(0,0,0,.55); }
 #wbbar { display:flex; gap:8px; align-items:center; padding:8px 10px; flex-wrap:wrap; }
 #wbbar button { border:none; border-radius:10px; padding:8px 12px; font-size:15px; font-weight:700;
                 background:var(--accent); color:#1a1a1a; cursor:pointer; font-family:inherit; }
 #wbbar button.tool.active { outline:3px solid #fff; }
 #wbbar .spacer { flex:1; }
 #wbwrap { flex:1; margin:0 10px 10px; }
 #wbcanvas { width:100%; height:100%; background:#fff; border-radius:12px; touch-action:none; display:block; }
 #wbtoast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:rgba(0,0,0,.85);
            color:#fff; padding:10px 16px; border-radius:12px; font-size:14px; display:none; z-index:9600;
            max-width:86vw; text-align:center; }
</style>
</head>
<body>
<!-- v5 password overlay -->
<div id="gate">
  <div id="gatebox">
    <div id="gatetitle">🔒 AI 錯題教練</div>
    <input id="pw" type="password" inputmode="text" placeholder="請輸入密碼" autocomplete="off">
    <button id="pwbtn">進入</button>
    <div id="pwerr"></div>
  </div>
</div>
<!-- v6 menu screen (shows after password, before chat) -->
<div id="menu">
  <div id="menubox">
    <div id="menutitle">今天要做什麼？</div>
    <div class="mgroup"><h2>📥 匯入錯題（拍照或貼題目）</h2><div class="mgrid" id="grid-import"></div></div>
    <div class="mgroup"><h2>📖 複習</h2><div class="mgrid" id="grid-review"></div></div>
  </div>
</div>
<!-- v6.2 whiteboard overlay -->
<div id="wb">
  <div id="wbbar">
    <button id="wbpen" class="tool active">✏️ 筆</button>
    <button id="wberase" class="tool">🧽 橡皮擦</button>
    <button id="wbundo">↩️ 復原</button>
    <button id="wbclear">🗑️ 清空</button>
    <span class="spacer"></span>
    <button id="wbcopy">📋 複製</button>
    <button id="wbshare">📤 儲存/分享</button>
    <button id="wbclose">✖ 關閉</button>
  </div>
  <div id="wbwrap"><canvas id="wbcanvas"></canvas></div>
</div>
<div id="wbtoast"></div>
<header>
  <button id="homebtn" title="回選單">🏠 選單</button>
  <button id="wbbtn" title="手寫白板">✏️ 白板</button>
  <div id="cheer"></div>
  <div id="deco"></div>
  <div id="player">
    <button id="prev" title="上一首">⏮</button>
    <button id="play" title="播放/暫停">▶️</button>
    <button id="next" title="下一首">⏭</button>
    <span id="track">🎵 古典音樂</span>
  </div>
</header>
<main><iframe id="chat" allow="camera; microphone; clipboard-write"></iframe></main>
<script>
/* ---- theme rotation: next theme on every visit ---- */
const idx = (parseInt(localStorage.getItem("themeIdx")||"-1",10)+1) % THEMES.length;
localStorage.setItem("themeIdx", idx);
const T = THEMES[idx];
document.documentElement.style.setProperty("--bg1", T.c[0]);
document.documentElement.style.setProperty("--bg2", T.c[1]);
document.documentElement.style.setProperty("--accent", T.c[2]);
document.getElementById("cheer").textContent = `${T.e} 今日應援：${T.n}｜${STUDENT_NAME} 加油！`;
document.getElementById("deco").innerHTML =
  "<span>" + Array(14).fill(0).map((_,i)=>T.d[i%T.d.length]).join("　") + "</span>";
document.title = `AI 錯題教練 ${T.e}`;

/* ---- ad-free classical player ---- */
const audio = new Audio(); let ti = Math.floor(Math.random()*PLAYLIST.length); let playing = false;
function loadTrack(){ audio.src = PLAYLIST[ti][1]; document.getElementById("track").textContent = "🎵 " + PLAYLIST[ti][0]; }
function toggle(){ playing = !playing; if(playing){ if(!audio.src) loadTrack(); audio.play(); } else audio.pause();
  document.getElementById("play").textContent = playing ? "⏸" : "▶️"; }
function step(k){ ti = (ti+k+PLAYLIST.length)%PLAYLIST.length; loadTrack(); if(playing) audio.play(); }
audio.onended = () => step(1); audio.volume = 0.35;
document.getElementById("play").onclick = toggle;
document.getElementById("next").onclick = () => step(1);
document.getElementById("prev").onclick = () => step(-1);

/* ---- session timing + logout/timeout beacon ---- */
let sessionStart = Date.now();
function beacon(){
  const mins = Math.round((Date.now() - sessionStart) / 60000 * 10) / 10;
  sessionStart = Date.now();                       // reset so overlapping events don't double-count
  if (mins < 0.5) return;
  const payload = JSON.stringify({ token: SESSION_TOKEN, student: STUDENT, action: "session_end", minutes: mins });
  navigator.sendBeacon(API_URL, new Blob([payload], {type:"text/plain"}));
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") beacon();
  else sessionStart = Date.now();                  // back from background: idle time must not count
});
window.addEventListener("pagehide", beacon);

/* ---- v6 menu: buttons pre-fill the Dify start form via URL params ----
   Dify expects each input value GZIP-compressed then base64-encoded (same as its embed.js). */
async function gz64(s){
  const stream = new Blob([s]).stream().pipeThrough(new CompressionStream("gzip"));
  const buf = await new Response(stream).arrayBuffer();
  let bin = ""; new Uint8Array(buf).forEach(b => bin += String.fromCharCode(b));
  return encodeURIComponent(btoa(bin));
}
async function openChat(action, subject){
  let url = DIFY_URL;
  try { url += "?action=" + await gz64(action) + "&subject=" + await gz64(subject); }
  catch(e){ /* very old browser: open without pre-fill, form still works manually */ }
  document.getElementById("menu").style.display = "none";
  document.getElementById("homebtn").style.display = "inline-block";
  document.getElementById("wbbtn").style.display = "inline-block";   // v6.2: whiteboard available while chatting
  document.getElementById("chat").src = url;
  sessionStart = Date.now();                        // start timing when the chat actually opens
}
function buildMenu(){
  const gi = document.getElementById("grid-import"), gr = document.getElementById("grid-review");
  SUBJECTS.forEach(s => {
    const bi = document.createElement("button"); bi.textContent = "匯入" + s + "題";
    bi.onclick = () => openChat("匯入錯題", s); gi.appendChild(bi);
    const br = document.createElement("button"); br.textContent = "複習" + s;
    br.onclick = () => openChat("複習", s); gr.appendChild(br);
  });
}
buildMenu();
document.getElementById("homebtn").onclick = () => {
  document.getElementById("chat").src = "";          // unload chat; picking a button reloads it fresh
  document.getElementById("homebtn").style.display = "none";
  document.getElementById("wbbtn").style.display = "none";
  document.getElementById("wb").style.display = "none";
  document.getElementById("menu").style.display = "flex";
};

/* ---- v6.2 whiteboard: draw → 複製 (paste in chat) or 儲存/分享 (Photos → 📎) ----
   The Dify iframe is cross-origin, so the drawing can't be injected directly;
   the student pastes it or attaches it — the coach's Vision reads it like any photo. */
const wb = document.getElementById("wb"), wbc = document.getElementById("wbcanvas"), wbx = wbc.getContext("2d");
let wbStrokes = [], wbCur = null, wbTool = "pen", wbDrawing = false;
function wbResize(){
  const r = wbc.parentElement.getBoundingClientRect(), d = window.devicePixelRatio || 1;
  wbc.width = Math.round(r.width * d); wbc.height = Math.round(r.height * d);
  wbx.setTransform(d, 0, 0, d, 0, 0); wbRedraw();
}
function wbRedraw(){
  wbx.save(); wbx.setTransform(1,0,0,1,0,0);
  wbx.fillStyle = "#fff"; wbx.fillRect(0, 0, wbc.width, wbc.height); wbx.restore();
  wbStrokes.forEach(s => {
    wbx.strokeStyle = s.c; wbx.lineWidth = s.w; wbx.lineCap = wbx.lineJoin = "round";
    wbx.beginPath();
    s.p.forEach((pt, i) => i ? wbx.lineTo(pt[0], pt[1]) : wbx.moveTo(pt[0], pt[1]));
    if (s.p.length === 1) wbx.lineTo(s.p[0][0] + .1, s.p[0][1]);   // a dot
    wbx.stroke();
  });
}
function wbPos(e){ const r = wbc.getBoundingClientRect(); return [e.clientX - r.left, e.clientY - r.top]; }
wbc.addEventListener("pointerdown", e => {
  e.preventDefault(); wbc.setPointerCapture(e.pointerId); wbDrawing = true;
  wbCur = { c: wbTool === "pen" ? "#111" : "#fff", w: wbTool === "pen" ? 3 : 26, p: [wbPos(e)] };
  wbStrokes.push(wbCur); wbRedraw();
});
wbc.addEventListener("pointermove", e => {
  if (!wbDrawing) return;
  const p = wbPos(e), last = wbCur.p[wbCur.p.length - 1];
  wbCur.p.push(p);
  wbx.strokeStyle = wbCur.c; wbx.lineWidth = wbCur.w; wbx.lineCap = wbx.lineJoin = "round";
  wbx.beginPath(); wbx.moveTo(last[0], last[1]); wbx.lineTo(p[0], p[1]); wbx.stroke();
});
["pointerup", "pointercancel"].forEach(ev => wbc.addEventListener(ev, () => { wbDrawing = false; wbCur = null; }));
function wbSetTool(t){
  wbTool = t;
  document.getElementById("wbpen").classList.toggle("active", t === "pen");
  document.getElementById("wberase").classList.toggle("active", t === "erase");
}
function wbToast(msg){
  const t = document.getElementById("wbtoast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 3200);
}
function wbBlob(){ return new Promise(res => wbc.toBlob(res, "image/png")); }
document.getElementById("wbpen").onclick = () => wbSetTool("pen");
document.getElementById("wberase").onclick = () => wbSetTool("erase");
document.getElementById("wbundo").onclick = () => { wbStrokes.pop(); wbRedraw(); };
document.getElementById("wbclear").onclick = () => { wbStrokes = []; wbRedraw(); };
document.getElementById("wbclose").onclick = () => { wb.style.display = "none"; };
document.getElementById("wbbtn").onclick = () => { wb.style.display = "flex"; requestAnimationFrame(wbResize); };
window.addEventListener("resize", () => { if (wb.style.display === "flex") wbResize(); });
document.getElementById("wbcopy").onclick = async () => {
  try {
    await navigator.clipboard.write([new ClipboardItem({ "image/png": wbBlob() })]);
    wbToast("已複製！關閉白板後，長按對話輸入框選「貼上」");
  } catch (e) { wbToast("這台裝置不支援複製圖片，請改用「儲存/分享」"); }
};
document.getElementById("wbshare").onclick = async () => {
  const blob = await wbBlob();
  const file = new File([blob], "whiteboard.png", { type: "image/png" });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file] }); wbToast("儲存到照片後，用對話框的 📎 上傳"); }
    catch (e) { /* user cancelled the share sheet */ }
  } else {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "whiteboard.png"; a.click();
    URL.revokeObjectURL(a.href); wbToast("已下載！用對話框的 📎 上傳");
  }
};

/* ---- v5 password gate: one-time per device (localStorage) ---- */
const AUTH_KEY = "auth_" + STUDENT;
function unlock(){
  document.getElementById("gate").style.display = "none";
  document.getElementById("menu").style.display = "flex";   // v6: show the button menu, not the chat
}
function tryUnlock(){
  if (document.getElementById("pw").value === PASSWORD){
    localStorage.setItem(AUTH_KEY, "ok");
    unlock();
  } else {
    document.getElementById("pwerr").textContent = "密碼錯誤，請再試一次";
    document.getElementById("pw").value = "";
  }
}
if (localStorage.getItem(AUTH_KEY) === "ok"){
  unlock();                                         // already trusted on this device
} else {
  document.getElementById("gate").style.display = "flex";
  document.getElementById("pwbtn").onclick = tryUnlock;
  document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });
  document.getElementById("pw").focus();
}
</script>
</body>
</html>
